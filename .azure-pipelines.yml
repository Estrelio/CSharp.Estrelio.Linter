trigger: none

pr:
  branches:
    include:
      - main

pool:
  name: Azure Pipelines

variables:
  - name: "NugetPackages"
    value: '$(Pipeline.Workspace)/../../.nuget/packages'
  - name: "RestoreBuildProjects"
    value: '**/*.csproj'
  - name: "BuildConfiguration"
    value: 'Release'

stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: BuildJob
        displayName: 'Build Job'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 9 SDK'
            inputs:
              version: 9.x

          - task: Cache@2
            displayName: Cache
            inputs:
              key: 'nuget | "$(Agent.OS)" | $(Build.SourcesDirectory)/**/packages.lock.json'
              path: '$(NugetPackages)'

          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet Packages'
            inputs:
              command: 'restore'
              feedsToUse: 'select'
              projects: '$(RestoreBuildProjects)'

          - task: DotNetCoreCLI@2
            displayName: 'Build Solution'
            inputs:
              command: 'build'
              arguments: '--configuration $(BuildConfiguration)'
              projects: '$(RestoreBuildProjects)'

          - task: DotNetCoreCLI@2
            displayName: 'Pack'
            inputs:
              command: 'pack'
              packagesToPack: '$(RestoreBuildProjects)'
              versioningScheme: 'off'
              arguments: '--configuration $(BuildConfiguration)'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
            condition: and(succeeded(), eq(variables['Build.Reason'], 'Manual'))

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy Job'
        environment: 'Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    set -xe
                    
                    ls -la
                    mkdir -p $(System.ArtifactsDirectory)/
                    cp -r $(Pipeline.Workspace)/drop $(System.ArtifactsDirectory)/.
                  displayName: 'Copy artifacts'

                - task: DotNetCoreCLI@2
                  displayName: 'Push NuGet Package to Azure Artifacts Feed'
                  inputs:
                    command: 'push'
                    packagesToPush: '$(System.ArtifactsDirectory)/**/*.nupkg'
                    nuGetFeedType: 'internal'
                    publishVstsFeed: 'ab991a84-d099-4d3b-a4b5-499f44e67262/b11cf5e4-d130-4f1f-938e-36c5566b9fb6'